<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - KUA Sukanagara</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #e9f3ff, #f8fbff);
      font-family: "Inter", system-ui, sans-serif;
      overflow: hidden;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(20px); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 6px;
    }

    .brand-icon {
      font-size: 1.8rem;
      color: #16a34a;
    }

    .muted {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    form label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 600;
    }

    .btn-primary {
      background: #1d4ed8;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: scale(1.02);
    }

    .btn-ghost {
      background: white;
      color: #1d4ed8;
      border: 1px solid #d1d5db;
    }

    .btn-ghost:hover {
      background: #eff6ff;
      transform: scale(1.02);
    }

    .small-note {
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <span class="brand-icon">🏛️</span> KUA Sukanagara
      <button id="themeToggle" class="btn ghost">🌙</button>
    </div>
    <p class="muted">Aplikasi Surat Keluar & Arsip Buku Agenda</p>

    <form id="loginForm">
      <label>Username
        <input type="text" id="username" placeholder="Masukkan username" required>
      </label>
      <label>Password
        <input type="password" id="password" placeholder="Masukkan password" required>
      </label>

      <div class="row">
        <button type="submit" class="btn btn-primary">Masuk</button>
        <button type="button" id="demoBtn" class="btn btn-ghost">Demo</button>
      </div>
    </form>

    <p class="small-note">Gunakan akun pegawai KUA atau coba <strong>mode demo</strong>.</p>
  </main>

  <script src="app.js"></script>
  <script>
    // Saat form login dikirim
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (appAuth.login(u,p)) {
        window.location.href = 'index.html';
      } else {
        alert('Login gagal — periksa username / password.');
      }
    });

    // Tombol demo login
    document.getElementById('demoBtn').addEventListener('click', function(){
      const demo = { username: 'pegawai1', password: 'password123', name: 'Pegawai Demo' };
      appAuth.ensureUser(demo);
      appAuth.login(demo.username, demo.password);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
